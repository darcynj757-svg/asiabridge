databases:
  - name: asiabridge-db
    databaseName: asiabridge
    user: asiabridge
    plan: free

services:
  - type: web
    name: asiabridge-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: asiabridge-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: asiabridge-frontend
    env: static
    plan: free
    buildCommand: BASE_PATH=/ pnpm install && pnpm --filter @workspace/asiabridge run build
    staticPublishPath: ./artifacts/asiabridge/dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
